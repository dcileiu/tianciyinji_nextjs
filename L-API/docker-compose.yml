services:
  mysql:
    image: mysql:8.4
    container_name: l-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: l_api
      MYSQL_USER: lapi
      MYSQL_PASSWORD: lapi_pwd
    ports:
      - "3306:3306"
    volumes:
      - l-api-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  l-api-mysql-data:
